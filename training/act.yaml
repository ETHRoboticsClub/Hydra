apiVersion: trainer.kubeflow.org/v1alpha1
kind: TrainJob
metadata:
  name: act-training
  namespace: robot-learning
spec:
  runtimeRef:
    name: torch-distributed
  trainer:
    image: pytorch/pytorch:2.10.0-cuda13.0-cudnn9-runtime
    command:
      - /bin/bash
      - -c
      - aws s3 cp s3://YOUR_BUCKET_NAME/scripts/run.sh /tmp/run.sh && bash /tmp/run.sh
    numNodes: 1
    resourcesPerNode:
      requests:
        nvidia.com/gpu: "1"
      limits:
        nvidia.com/gpu: "1"
  podTemplateOverrides:
    - targetJobs:
        - name: node
      spec:
        nodeSelector:
          karpenter.sh/nodepool: gpus
          node-tier: gpus
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
        volumes:
          - name: data
            persistentVolumeClaim:
              claimName: testing1-data
          - name: checkpoints
            persistentVolumeClaim:
              claimName: testing1-checkpoints
        containers:
          - name: node
            volumeMounts:
              - name: data
                mountPath: /data
              - name: checkpoints
                mountPath: /checkpoints

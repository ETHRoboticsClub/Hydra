apiVersion: trainer.kubeflow.org/v1alpha1
kind: TrainJob
metadata:
  name: act-training
  namespace: robot-learning
spec:
  runtimeRef:
    name: torch-distributed
  trainer:
    image: ghcr.io/ethroboticsclub/pytorch:latest
    command: ["/bin/bash", "/workspace/run.sh"]
    numNodes: 1
    resourcesPerNode:
      requests:
        cpu: "4"
        memory: "16Gi"
        nvidia.com/gpu: "1"
      limits:
        nvidia.com/gpu: "1"
  podTemplateOverrides:
    - targetJobs:
        - name: node
      spec:
        nodeSelector:
          node-tier: gpum
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
        volumes:
          - name: data
            persistentVolumeClaim:
              claimName: testing1-data
          - name: checkpoints
            persistentVolumeClaim:
              claimName: testing1-checkpoints
          - name: scripts
            configMap:
              name: training-scripts
              defaultMode: 0755
        containers:
          - name: node
            volumeMounts:
              - name: data
                mountPath: /data
              - name: checkpoints
                mountPath: /checkpoints
              - name: scripts
                mountPath: /workspace

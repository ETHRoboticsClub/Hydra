namespace: robot-learning
service_account_name: training-sa
image: 916780037007.dkr.ecr.us-east-1.amazonaws.com/ethroboticsclub/pytorch:sha-d866de5
data_pvc: act-data
checkpoint_pvc: act-checkpoints
cache_pvc: cache
s3_data_pvc: s3-data
git_clone_depth: 1
default_shared_memory_size: 256Mi

# Structured volume definitions (used by launch-new)
volumes:
  data:
    pvc: act-data
    mountPath: /data
  checkpoints:
    pvc: act-checkpoints
    mountPath: /checkpoints
  s3:
    pvc: s3-data
    mountPath: /s3
  shm:
    emptyDir:
      medium: Memory
      sizeLimit: 256Mi

# Secrets configuration (used by launch-new)
secrets:
  wandb:
    secretName: wandb-secret
    mountPath: /var/run/secrets/wandb
  hf:
    secretName: hf-secret
    mountPath: /var/run/secrets/hf

# Additional environment variables for trainer containers
trainer_env:
  # Add any global env vars here that should be injected into all training jobs
  # Example: HYDRA_FULL_ERROR: "1"

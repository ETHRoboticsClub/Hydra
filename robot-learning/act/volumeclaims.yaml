apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cache
  namespace: robot-learning
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: act-data
  namespace: robot-learning
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: act-checkpoints
  namespace: robot-learning
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi

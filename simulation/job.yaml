apiVersion: trainer.kubeflow.org/v1alpha1
kind: TrainJob
metadata:
  name: simulation-job
  namespace: robot-learning
spec:
  runtimeRef:
    name: torch-distributed
  trainer:
    image: our-simulation-image:latest
    numNodes: 1
    numProcPerNode: 1
    resourcesPerNode:
      requests:
        cpu: "4"
        memory: "16Gi"
        nvidia.com/gpu: "1"
    env:
      - name: WANDB_API_KEY
        valueFrom:
          secretKeyRef:
            name: training-secrets
            key: wandb-api-key
  podTemplateOverrides:
    - targetJobs:
        - name: node
      spec:
        nodeSelector:
          node-tier: gpum
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
        volumes:
          - name: data
            persistentVolumeClaim:
              claimName: training-data-pvc
          - name: checkpoints
            persistentVolumeClaim:
              claimName: checkpoints-pvc
        containers:
          - name: node
            volumeMounts:
              - name: data
                mountPath: /data
              - name: checkpoints
                mountPath: /checkpoints

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: groot-finetune-data
  namespace: humanoid
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3
  resources:
    requests:
      storage: 8Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: groot-finetune-checkpoints
  namespace: humanoid
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3
  resources:
    requests:
      storage: 500Gi

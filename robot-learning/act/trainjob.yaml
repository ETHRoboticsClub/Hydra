apiVersion: trainer.kubeflow.org/v1alpha1
kind: TrainJob
metadata:
  name: act-training
  namespace: robot-learning
spec:
  runtimeRef:
    name: torch-distributed
  trainer:
    image: 916780037007.dkr.ecr.us-east-1.amazonaws.com/ethroboticsclub/pytorch:sha-d866de5
    env:
      - name: UV_CACHE_DIR
        value: /cache/uv
      - name: HF_HOME
        value: /cache/hf
      - name: HF_HUB_CACHE
        value: /cache/hf/hub
      - name: HF_DATASETS_CACHE
        value: /cache/hf/datasets
      - name: TORCH_HOME
        value: /cache/torch
      - name: TORCHINDUCTOR_CACHE_DIR
        value: /cache/torch/inductor
      - name: TRITON_CACHE_DIR
        value: /cache/torch/triton
    command:
      - /bin/bash
      - -c
      - >-
        set -euxo pipefail
        && HYDRA_GIT_BRANCH=master
        && DATASET_REVISION=trimmed
        && sudo mkdir -p /checkpoints/act /cache/hf /cache/uv /cache/torch
        && sudo chown -R "$(id -u):$(id -g)" /data /checkpoints /cache
        && exec > >(tee -a /checkpoints/act/bootstrap.log) 2>&1
        && if [ -d /tmp/hydra/.git ]; then cd /tmp/hydra && git fetch origin "${HYDRA_GIT_BRANCH}" && git reset --hard "origin/${HYDRA_GIT_BRANCH}";
        else git clone --branch "${HYDRA_GIT_BRANCH}" --single-branch https://github.com/ETHRoboticsClub/Hydra.git /tmp/hydra; fi
        && set +x
        && export WANDB_API_KEY="$(cat /var/run/secrets/wandb/WANDB_API_KEY)"
        && export HF_TOKEN="$(cat /var/run/secrets/hf/HF_TOKEN)"
        && set -x
        && cd /tmp/hydra/robot-learning/act/run/
        && DATASET_REVISION="${DATASET_REVISION}" bash entrypoint.sh
    numNodes: 1
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
    resourcesPerNode:
      requests:
        cpu: "1"
        memory: "4Gi"
        nvidia.com/gpu: "1"
      limits:
        cpu: "8"
        memory: "16Gi"
        nvidia.com/gpu: "1"
  podTemplateOverrides:
    - targetJobs:
        - name: node
      spec:
        serviceAccountName: training-sa
        nodeSelector:
          karpenter.sh/nodepool: gpus
          node-tier: gpus
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
        volumes:
          - name: data
            persistentVolumeClaim:
              claimName: act-data
          - name: checkpoints
            persistentVolumeClaim:
              claimName: act-checkpoints
          - name: cache
            persistentVolumeClaim:
              claimName: cache
          - name: dshm
            emptyDir:
              medium: Memory
              sizeLimit: 8Gi
          - name: wandb-secret
            secret:
              secretName: wandb-secret
          - name: hf-secret
            secret:
              secretName: hf-secret
        containers:
          - name: node
            volumeMounts:
              - name: data
                mountPath: /data
              - name: checkpoints
                mountPath: /checkpoints
              - name: cache
                mountPath: /cache
              - name: dshm
                mountPath: /dev/shm
              - name: wandb-secret
                mountPath: /var/run/secrets/wandb
                readOnly: true
              - name: hf-secret
                mountPath: /var/run/secrets/hf
                readOnly: true

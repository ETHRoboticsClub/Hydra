apiVersion: trainer.kubeflow.org/v1alpha1
kind: TrainJob
metadata:
  name: cosmos-libero-interactive
  namespace: robot-learning
spec:
  runtimeRef:
    name: torch-distributed
  trainer:
    # AWS Deep Learning Container — matches "Deep Learning OSS Nvidia Driver AMI GPU PyTorch 2.x (Ubuntu 22.04)"
    # CUDA 12.6, cuDNN, NCCL, PyTorch 2.7, Python 3.11 pre-installed
    # Replace <region> with your AWS region (e.g. us-east-1)
    image: 763104351884.dkr.ecr.us-east-1.amazonaws.com/pytorch-training:2.7.0-gpu-py311-cu126-ubuntu22.04-ec2
    command:
      - /bin/bash
      - -lc
      - |
        cp /job-files/main.sh /tmp/main.sh
        chmod +x /tmp/main.sh
        exec /tmp/main.sh
    numNodes: 1
    resourcesPerNode:
      requests:
        cpu: "4"
        memory: "32Gi"
        nvidia.com/gpu: "1"
      limits:
        cpu: "16"
        memory: "64Gi"
        nvidia.com/gpu: "1"
  podTemplateOverrides:
    - targetJobs:
        - name: node
      spec:
        serviceAccountName: training-sa
        nodeSelector:
          karpenter.sh/nodepool: gpus
          node-tier: gpus
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
        volumes:
          - name: job-files
            configMap:
              name: cosmos-libero-files
              defaultMode: 0755
          - name: data
            persistentVolumeClaim:
              claimName: cosmos-libero
          - name: dshm
            emptyDir:
              medium: Memory
              sizeLimit: 16Gi
        containers:
          - name: node
            volumeMounts:
              - name: job-files
                mountPath: /job-files
                readOnly: true
              - name: data
                mountPath: /data
              - name: dshm
                mountPath: /dev/shm

apiVersion: trainer.kubeflow.org/v1alpha1
kind: TrainJob
metadata:
  name: act-training
  namespace: robot-learning
spec:
  runtimeRef:
    name: torch-distributed
  trainer:
    image: ghcr.io/ethroboticsclub/pytorch:latest
    # run.sh is injected via the run-sh ConfigMap — no image rebuild needed.
    command: ["/bin/bash", "/workspace/run.sh"]
    numNodes: 1
    resourcesPerNode:
      requests:
        nvidia.com/gpu: "1"
      limits:
        nvidia.com/gpu: "1"
    env:
      - name: DATASET_REPO_ID
        value: "lerobot/pusht"
      - name: DATASET_ROOT
        value: "/data"
      - name: CHECKPOINT_DIR
        value: "/checkpoints/act"
      - name: WANDB_API_KEY
        valueFrom:
          secretKeyRef:
            name: training-secrets
            key: wandb-api-key
  podTemplateOverrides:
    - targetJobs:
        - name: node
      spec:
        nodeSelector:
          karpenter.sh/nodepool: gpus
          node-tier: gpus
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
        volumes:
          - name: data
            persistentVolumeClaim:
              claimName: testing1-data
          - name: checkpoints
            persistentVolumeClaim:
              claimName: testing1-checkpoints
          - name: run-sh
            configMap:
              name: run-sh
              defaultMode: 0755   # executable
        containers:
          - name: node
            volumeMounts:
              - name: data
                mountPath: /data
              - name: checkpoints
                mountPath: /checkpoints
              - name: run-sh
                mountPath: /workspace/run.sh
                subPath: run.sh

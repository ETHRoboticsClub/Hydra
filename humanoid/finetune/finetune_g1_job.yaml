apiVersion: trainer.kubeflow.org/v1alpha1
kind: TrainJob
metadata:
  name: groot-finetune-g1
  namespace: humanoid
spec:
  runtimeRef:
    name: torch-distributed
  trainer:
    # NOTE: run.sh lives at humanoid/finetune/run.sh on the humanoid/gpu-smoke-test branch.
    image: 916780037007.dkr.ecr.us-east-1.amazonaws.com/ethroboticsclub/pytorch:sha-d866de5
    command:
      - /bin/bash
      - -c
      - curl https://raw.githubusercontent.com/ETHRoboticsClub/Hydra/refs/heads/humanoid/gpu-smoke-test/humanoid/finetune/run.sh -o /tmp/run.sh && bash /tmp/run.sh
    numNodes: 1
    resourcesPerNode:
      requests:
        nvidia.com/gpu: "4"
        cpu: "40"
        memory: "320Gi"
        ephemeral-storage: "400Gi"
      limits:
        nvidia.com/gpu: "4"
        cpu: "40"
        memory: "320Gi"
        ephemeral-storage: "400Gi"
  podTemplateOverrides:
    - targetJobs:
        - name: node
      spec:
        serviceAccountName: training-sa
        nodeSelector:
          karpenter.sh/nodepool: gpul
          node-tier: gpul
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
        volumes:
          - name: data
            persistentVolumeClaim:
              claimName: groot-finetune-data
          - name: checkpoints
            persistentVolumeClaim:
              claimName: groot-finetune-checkpoints
          - name: dshm
            emptyDir:
              medium: Memory
              sizeLimit: 16Gi
          - name: hf-token
            secret:
              secretName: hf-token
        containers:
          - name: node
            volumeMounts:
              - name: data
                mountPath: /data
              - name: checkpoints
                mountPath: /checkpoints
              - name: dshm
                mountPath: /dev/shm
              - name: hf-token
                mountPath: /secrets/hf
                readOnly: true

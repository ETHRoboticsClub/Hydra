apiVersion: trainer.kubeflow.org/v1alpha1
kind: TrainJob
metadata:
  name: cosmos-wrapper-interactive
  namespace: robot-learning
spec:
  runtimeRef:
    name: torch-distributed
  trainer:
    image: 916780037007.dkr.ecr.us-east-1.amazonaws.com/ethroboticsclub/pytorch:sha-d866de5
    command:
      - /bin/bash
      - -lc
      - |
        cp /job-files/main.sh /tmp/main.sh
        chmod +x /tmp/main.sh
        exec /tmp/main.sh
    numNodes: 1
    resourcesPerNode:
      requests:
        cpu: "16"
        memory: "64Gi"
        nvidia.com/gpu: "1"
      limits:
        cpu: "44"
        memory: "160Gi"
        nvidia.com/gpu: "1"
  podTemplateOverrides:
    - targetJobs:
        - name: node
      spec:
        serviceAccountName: training-sa
        nodeSelector:
          karpenter.sh/nodepool: gpum
          node-tier: gpum
          node.kubernetes.io/instance-type: g6e.xlarge
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
        volumes:
          - name: dshm
            emptyDir:
              medium: Memory
              sizeLimit: 16Gi
          # Persistent Cosmos weights / HF cache / artifacts (same PVC pattern as interactive-gpu).
          # Create a dedicated PVC and change claimName if you want this job isolated from /checkpoints.
          - name: cosmos-persist
            persistentVolumeClaim:
              claimName: act-checkpoints
          - name: job-files
            configMap:
              name: cosmos-wrapper-files
              defaultMode: 0755
        containers:
          - name: node
            volumeMounts:
              - name: dshm
                mountPath: /dev/shm
              - name: cosmos-persist
                mountPath: /persist
              - name: job-files
                mountPath: /job-files
                readOnly: true
